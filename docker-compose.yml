networks:
  erp:
    driver: bridge
    ipam:
      config:
        # Static IPs for api/frontend — nginx upstreams use these (no stale Docker DNS after recreate)
        - subnet: 172.29.44.0/24

services:

  postgres:
    image: postgres:15-alpine
    container_name: vehicle_erp_db
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=50", "-c", "work_mem=4MB"]
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-vehicle_erp}
    networks:
      erp:
        # Static IP avoids Docker DNS failures (EAI_AGAIN on hostname "postgres") on some hosts / mixed static+dynamic compose networks
        ipv4_address: 172.29.44.10
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-vehicle_erp}"]
      interval: 5s
      timeout: 3s
      retries: 10


  redis:
    image: redis:7-alpine
    container_name: vehicle_erp_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      erp:
        ipv4_address: 172.29.44.21
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: vehicle_erp_api
    restart: unless-stopped
    networks:
      erp:
        ipv4_address: 172.29.44.11
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # Must accept connections from nginx container — do not override with 127.0.0.1 in .env
      LISTEN_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-erp_user}:${DB_PASSWORD}@172.29.44.10:5432/${DB_NAME:-vehicle_erp}
      REDIS_URL: redis://172.29.44.21:6379
      PGHOST: 172.29.44.10
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://microtechnique.in}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://microtechnique.in}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      TWO_FACTOR_API_KEY: ${TWO_FACTOR_API_KEY:-}
      MASTERS_INDIA_ENV: ${MASTERS_INDIA_ENV:-sandbox}
      MASTERS_INDIA_API_KEY: ${MASTERS_INDIA_API_KEY:-}
      MASTERS_INDIA_API_AUTH_MODE: ${MASTERS_INDIA_API_AUTH_MODE:-authorization_jwt}
      MASTERS_INDIA_OPAQUE_AUTH: ${MASTERS_INDIA_OPAQUE_AUTH:-bearer_and_api_key}
      MASTERS_INDIA_USERNAME: ${MASTERS_INDIA_USERNAME:-}
      MASTERS_INDIA_PASSWORD: ${MASTERS_INDIA_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "scripts/docker-healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s


  frontend:
    build: ./frontend
    container_name: vehicle_erp_frontend
    restart: unless-stopped
    networks:
      erp:
        ipv4_address: 172.29.44.12

  # Single definition — do NOT merge a second compose file for nginx (duplicate ports break binds).
  # Before certs exist: temporarily swap volumes to nginx-no-ssl.conf and only port "80:80", then certbot, then restore.
  nginx:
    image: nginx:alpine
    container_name: vehicle_erp_nginx
    restart: unless-stopped
    networks: [erp]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  uploads:
