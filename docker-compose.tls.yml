# Use AFTER Let's Encrypt certs exist on the host:
#   /etc/letsencrypt/live/microtechnique.in/fullchain.pem
#
# Replace the `nginx` service in docker-compose.yml with this block, OR run:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d --force-recreate nginx
# (If your Compose version merges `ports`/`volumes` badly, copy-paste this service into docker-compose.yml
#  instead of using two files.)
#
services:
  nginx:
    image: nginx:alpine
    container_name: vehicle_erp_nginx
    restart: unless-stopped
    networks: [erp]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
